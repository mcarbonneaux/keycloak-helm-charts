{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "common.names.fullname" . }}
  namespace: {{ include "common.names.namespace" . | quote }}
  {{- $labels := include "common.tplvalues.merge" (dict "values" (list .Values.gateway.labels .Values.commonLabels) "context" .) }}
  labels: {{- include "common.labels.standard" (dict "customLabels" $labels "context" .) | nindent 4 }}
    app.kubernetes.io/component: keycloak
    app.kubernetes.io/part-of: keycloak
  {{- if or .Values.gateway.annotations .Values.commonAnnotations }}
  {{- $annotations := include "common.tplvalues.merge" (dict "values" (list .Values.gateway.annotations .Values.commonAnnotations) "context" .) }}
  annotations: {{- include "common.tplvalues.render" (dict "value" $annotations "context" .) | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.gateway.gatewayRefs }}
  parentRefs:
    {{- range .Values.gateway.gatewayRefs }}
    - name: {{ .name }}
      {{- if .namespace }}
      namespace: {{ .namespace }}
      {{- end }}
      {{- if or .sectionName (and $.Values.gateway.tls.enabled $.Values.gateway.tls.sectionName) }}
      sectionName: {{ default $.Values.gateway.tls.sectionName .sectionName }}
      {{- end }}
    {{- end }}
  {{- end }}
  hostnames:
    - {{ (tpl .Values.gateway.hostname .) | quote }}
    {{- range .Values.gateway.extraHosts }}
    - {{ (tpl .name $) | quote }}
    {{- end }}
  rules:
    {{- if .Values.gateway.rules }}
    {{- include "common.tplvalues.render" (dict "value" .Values.gateway.rules "context" .) | nindent 4 }}
    {{- else }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ tpl .Values.gateway.path . | quote }}
      backendRefs:
        - name: {{ include "common.names.fullname" . }}
          port: {{ index .Values.service.ports .Values.gateway.servicePort }}
    {{- end }}
{{- end }}
