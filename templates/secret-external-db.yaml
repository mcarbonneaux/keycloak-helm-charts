{{- if not .Values.dbExistingSecret }}
apiVersion: v1
kind: Secret
metadata:
  {{- $secretName := printf "%s-db" (include "common.names.fullname" .) }}
  name: {{ $secretName }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" (dict "customLabels" .Values.commonLabels "context" .) | nindent 4 }}
    app.kubernetes.io/part-of: keycloak
  {{- if or .Values.dbAnnotations .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.merge" (dict "values" (list .Values.dbAnnotations .Values.commonAnnotations) "context" .) | nindent 4 }}
  {{- end }}
type: Opaque
data:
  db-password: {{ include "common.secrets.passwords.manage" (dict "secret" $secretName "key" "db-password" "length" 10 "providedValues" (list "dbPassword") "context" .) }}
{{- end }}
