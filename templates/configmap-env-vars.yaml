apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-env-vars" (include "common.names.fullname" .) }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" (dict "customLabels" .Values.commonLabels "context" .) | nindent 4 }}
    app.kubernetes.io/component: keycloak
    app.kubernetes.io/part-of: keycloak
{{- if .Values.commonAnnotations }}
  annotations:
    {{- include "common.tplvalues.render" (dict "value" .Values.commonAnnotations "context" .) | nindent 4 }}
{{- end }}
data:
  KC_LOG_LEVEL: {{ .Values.logging.level | quote }}
  KC_LOG_CONSOLE_OUTPUT: {{ if eq .Values.logging.output "ecs" }}{{ "json" | quote }}{{ else }}{{ .Values.logging.output | quote }}{{ end }}
  {{- if eq .Values.logging.output "ecs" }}
  KC_LOG_CONSOLE_FORMAT: "ecs"
  {{- end }}
  {{- if .Values.logging.otelEnabled }}
  KC_TELEMETRY_LOGS_ENABLED: "true"
  {{- if .Values.logging.otelEndpoint }}
  KC_OTEL_ENDPOINT: {{ .Values.logging.otelEndpoint | quote }}
  {{- end }}
  {{- end }}
  {{- if or .Values.features .Values.cache.remote.clusterless }}
  KC_FEATURES: {{ if and .Values.features .Values.cache.remote.clusterless }}{{ join "," (append (append .Values.features "multi-site") "clusterless") | quote }}{{ else if .Values.cache.remote.clusterless }}{{ "multi-site,clusterless" | quote }}{{ else }}{{ join "," .Values.features | quote }}{{ end }}
  {{- end }}
  {{- if .Values.cache.remote.clusterless }}
  KC_FEATURES_DISABLED: "persistent-user-sessions"
  {{- end }}
  {{- if or (and .Values.auth .Values.auth.adminUser) (and .Values.auth .Values.auth.adminPassword) }}
  # KC_BOOTSTRAP_ADMIN_USERNAME is moved to workload.yaml for atomicity with password
  {{- end }}
  {{- if and .Values.usePasswordFiles (not (and .Values.auth .Values.auth.adminUser)) }}
  KC_BOOTSTRAP_ADMIN_PASSWORD_FILE: {{ printf "/opt/keycloak/secrets/%s" (include "keycloak.secretKey" .) }}
  {{- end }}
  KC_HTTP_PORT: {{ .Values.containerPorts.http | quote }}
  KC_HTTPS_PORT: {{ .Values.containerPorts.https | quote }}
  KC_HTTP_ENABLED: {{ ternary "true" "false" (or .Values.httpEnabled (not .Values.tls.enabled)) | quote }}
  {{- if .Values.proxyHeaders }}
  KC_PROXY_HEADERS: {{ .Values.proxyHeaders | quote }}
  {{- end }}
  {{- if .Values.proxy }}
  KC_PROXY: {{ .Values.proxy | quote }}
  {{- end }}
  {{- if .Values.proxyTrustedAddresses }}
  KC_PROXY_TRUSTED_ADDRESSES: {{ .Values.proxyTrustedAddresses | quote }}
  {{- end }}
  KC_HOSTNAME_STRICT: {{ ternary "true" "false" .Values.hostnameStrict | quote }}
  {{- if or (eq .Values.hostnameStrictHttps true) (eq .Values.hostnameStrictHttps false) }}
  KC_HOSTNAME_STRICT_HTTPS: {{ ternary "true" "false" .Values.hostnameStrictHttps | quote }}
  {{- end }}
  {{- if or (eq .Values.hostnameStrictBackchannel true) (eq .Values.hostnameStrictBackchannel false) }}
  KC_HOSTNAME_STRICT_BACKCHANNEL: {{ ternary "true" "false" .Values.hostnameStrictBackchannel | quote }}
  {{- end }}
  {{- if .Values.ingress.enabled }}
{{- if .Values.ingress.hostname }}
  {{- $path := tpl .Values.ingress.path . }}
  {{- if and (eq .Values.ingress.controller "gce") (hasSuffix "*" $path) }}
    {{- $path = trimSuffix "*" $path }}
  {{- end }}
  KC_HOSTNAME: {{ printf "%s://%s%s" (ternary "https" "http" (or .Values.ingress.tls (not (empty .Values.proxyHeaders)))) (tpl .Values.ingress.hostname .) $path | quote }}
  {{- end }}
{{- end }}
  KC_HEALTH_ENABLED: "true"
  KC_METRICS_ENABLED: {{ ternary "true" "false" .Values.metrics.enabled | quote }}
  KC_DB: "postgres"
  KC_DB_URL: {{ printf "jdbc:postgresql://%s:%d/%s?currentSchema=%s%s" (include "keycloak.database.host" .) (include "keycloak.database.port" . | int) (include "keycloak.database.name" .) (include "keycloak.database.schema" .) (include "keycloak.database.extraParams" .) | quote }}
  KC_DB_SCHEMA: {{ include "keycloak.database.schema" . | quote }}
{{- if .Values.usePasswordFiles }}
  KC_DB_PASSWORD_FILE: {{ printf "/opt/keycloak/secrets/db-%s" (include "keycloak.database.secretPasswordKey" .) }}
  {{- if .Values.dbExistingSecretUserKey }}
  KC_DB_USERNAME_FILE: {{ printf "/opt/keycloak/secrets/db-%s" (include "keycloak.database.secretUserKey" .) }}
  {{- end }}
{{- end }}
  {{- if not (and .Values.dbExistingSecret .Values.dbExistingSecretUserKey) }}
  KC_DB_USERNAME: {{ include "keycloak.database.user" . | quote }}
  {{- end }}
{{- if .Values.tls.enabled }}
  {{- if or .Values.tls.usePemCerts .Values.tls.autoGenerated.enabled }}
  KC_HTTPS_CERTIFICATE_FILE: {{ printf "/opt/keycloak/certs/%s" (ternary "tls.crt" .Values.tls.certFilename .Values.tls.autoGenerated.enabled) | quote }}
  KC_HTTPS_CERTIFICATE_KEY_FILE: {{ printf "/opt/keycloak/certs/%s" (ternary "tls.key" .Values.tls.certKeyFilename .Values.tls.autoGenerated.enabled) | quote }}
  {{- else }}
  KC_HTTPS_KEY_STORE_FILE: {{ printf "/opt/keycloak/certs/%s" .Values.tls.keystoreFilename | quote }}
  KC_HTTPS_TRUST_STORE_FILE: {{ printf "/opt/keycloak/certs/%s" .Values.tls.truststoreFilename | quote }}
  {{- end }}
{{- end }}
  {{- if .Values.trustedCertsExistingSecret }}
  KC_TRUSTSTORE_PATHS: "/opt/keycloak/truststore"
  {{- end }}
  KC_CACHE: {{ if and .Values.cache.remote.clusterless (not .Values.cache.remote.host) }}{{ "local" | quote }}{{ else }}{{ ternary "ispn" "local" .Values.cache.enabled | quote }}{{ end }}
  {{- if .Values.cache.remote.clusterless }}
  KC_CLUSTERLESS: "true"
  {{- end }}
{{- if .Values.cache.enabled }}
  {{- if not .Values.cache.remote.clusterless }}
    {{- if .Values.cache.stack }}
  KC_CACHE_STACK: {{ .Values.cache.stack | quote }}
    {{- end }}
  {{- end }}
  {{- if and (eq (include "keycloak.replicaKind" .) "Deployment") .Values.cache.remote.host (not .Values.cache.configFile) (not .Values.cache.remote.clusterless) }}
  KC_CACHE_CONFIG_FILE: "cache-ispn-full-remote.xml"
    {{- else if .Values.cache.configFile }}
  KC_CACHE_CONFIG_FILE: {{ .Values.cache.configFile | quote }}
  {{- end }}
  {{- if .Values.cache.remote.host }}
  KC_CACHE_REMOTE_HOST: {{ .Values.cache.remote.host | quote }}
  KC_CACHE_REMOTE_PORT: {{ .Values.cache.remote.port | quote }}
  {{- /* Explicit SSL toggle for HotRod client (default false) */}}
  {{- if and .Values.cache .Values.cache.remote (hasKey .Values.cache.remote "ssl") }}
  KC_CACHE_REMOTE_TLS_ENABLED: {{ ternary "true" "false" .Values.cache.remote.ssl | quote }}
  {{- else }}
  KC_CACHE_REMOTE_TLS_ENABLED: "false"
  {{- end }}
    {{- if and .Values.usePasswordFiles (not .Values.cache.remote.host) (or .Values.cache.remote.password .Values.cache.remote.existingSecret) }}
  KC_CACHE_REMOTE_PASSWORD_FILE: {{ printf "/opt/keycloak/secrets/remote-cache-%s" (include "keycloak.cache.remote.secretKey" .) }}
    {{- end }}
  {{- end }}
  {{- if not .Values.cache.remote.clusterless }}
    {{- $javaOptsAppend := printf "-Djgroups.dns.query=%s-headless.%s.svc.%s" (include "common.names.fullname" .) (include "common.names.namespace" .) .Values.clusterDomain -}}
    {{- if .Values.cache.javaOptsAppendExtra }}
      {{- $javaOptsAppend = printf "%s %s" $javaOptsAppend .Values.cache.javaOptsAppendExtra -}}
    {{- end }}
  JAVA_OPTS_APPEND: {{ quote $javaOptsAppend }}
  {{- else }}
    {{- if .Values.cache.javaOptsAppendExtra }}
  JAVA_OPTS_APPEND: {{ quote .Values.cache.javaOptsAppendExtra }}
    {{- end }}
  {{- end }}
{{- end }}
  KC_HTTP_RELATIVE_PATH: {{ .Values.httpRelativePath | quote }}
  {{- if .Values.adminRealm }}
  KC_SPI_ADMIN_REALM: {{ .Values.adminRealm | quote }}
  {{- end }}
