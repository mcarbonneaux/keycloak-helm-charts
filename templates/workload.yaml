{{- if and (ne (include "keycloak.replicaKind" .) "StatefulSet") (ne (include "keycloak.replicaKind" .) "Deployment") }}
{{- fail (printf "replicaKind must be either 'StatefulSet' or 'Deployment', got '%s'" (include "keycloak.replicaKind" .)) }}
{{- end }}
apiVersion: {{ include "keycloak.workload.apiVersion" . }}
{{- if and (eq (include "keycloak.replicaKind" .) "Deployment") (not .Values.cache.remote.host) }}
{{- fail "replicaKind: Deployment is only supported in 'Full Remote' mode. You must set cache.remote.host to use an external Infinispan server and ensure your Keycloak configuration (XML) is set to stateless (no local caches)." }}
{{- end }}
kind: {{ include "keycloak.replicaKind" . }}
metadata:
  name: {{ template "common.names.fullname" . }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" (dict "customLabels" $.Values.commonLabels "context" $) | nindent 4 }}
    app.kubernetes.io/component: keycloak
    app.kubernetes.io/part-of: keycloak
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
    {{- if .Values.selectorLabels }}
    {{- include "common.tplvalues.render" (dict "value" .Values.selectorLabels "context" $) | nindent 4 }}
    {{- end }}
  {{- if or .Values.statefulsetAnnotations .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.merge" (dict "values" (list .Values.statefulsetAnnotations .Values.commonAnnotations) "context" .) | nindent 4 }}
  {{- end }}
spec:
  {{- if not .Values.autoscaling.hpa.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  {{- if eq (include "keycloak.replicaKind" .) "StatefulSet" }}
  podManagementPolicy: {{ .Values.podManagementPolicy }}
  serviceName: {{ printf "%s-headless" (include "common.names.fullname" .) | trunc 63 | trimSuffix "-" }}
  {{- end }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimitCount }}
  {{- if eq (include "keycloak.replicaKind" .) "Deployment" }}
  strategy: {{- include "common.tplvalues.render" (dict "value" .Values.updateStrategy "context" .) | nindent 4 }}
  {{- else }}
  updateStrategy: {{- include "common.tplvalues.render" (dict "value" .Values.updateStrategy "context" .) | nindent 4 }}
  {{- end }}
  {{- if .Values.minReadySeconds }}
  minReadySeconds: {{ .Values.minReadySeconds }}
  {{- end }}
  selector:
    matchLabels: {{- include "common.labels.matchLabels" (dict "customLabels" .Values.selectorLabels "context" $) | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/configmap-env-vars: {{ include (print $.Template.BasePath "/configmap-env-vars.yaml") . | sha256sum }}
        {{- if not (and .Values.auth .Values.auth.existingSecret)  }}
        checksum/secrets: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
        {{- end }}
        {{- if and .Values.configuration (not .Values.existingConfigmap) }}
        checksum/configuration: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.podAnnotations }}
        {{- include "common.tplvalues.render" (dict "value" .Values.podAnnotations "context" .) | nindent 8 }}
        {{- end }}
      labels: {{- include "common.labels.standard" (dict "customLabels" .Values.podLabels "context" .) | nindent 8 }}
        app.kubernetes.io/component: keycloak
        app.kubernetes.io/part-of: keycloak
        {{- include "common.labels.podLabels" (dict "customLabels" .Values.selectorLabels "context" $) | nindent 8 }}
    spec:
      serviceAccountName: {{ template "keycloak.serviceAccountName" . }}
      {{- include "keycloak.imagePullSecrets" . | nindent 6 }}
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      {{- if .Values.hostAliases }}
      hostAliases: {{- include "common.tplvalues.render" (dict "value" .Values.hostAliases "context" .) | nindent 8 }}
      {{- end }}
      {{- if .Values.affinity }}
      affinity: {{- include "common.tplvalues.render" ( dict "value" .Values.affinity "context" .) | nindent 8 }}
      {{- end }}
      {{- if .Values.nodeSelector }}
      nodeSelector: {{- include "common.tplvalues.render" ( dict "value" .Values.nodeSelector "context" .) | nindent 8 }}
      {{- end }}
      {{- if .Values.tolerations }}
      tolerations: {{- include "common.tplvalues.render" (dict "value" .Values.tolerations "context" .) | nindent 8 }}
      {{- end }}
      {{- if .Values.topologySpreadConstraints }}
      topologySpreadConstraints: {{- include "common.tplvalues.render" (dict "value" .Values.topologySpreadConstraints "context" .) | nindent 8 }}
      {{- end }}
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName | quote }}
      {{- end }}
      {{- if .Values.schedulerName }}
      schedulerName: {{ .Values.schedulerName }}
      {{- end }}
      {{- if .Values.podSecurityContext.enabled }}
      securityContext:
        fsGroup: {{ .Values.podSecurityContext.fsGroup }}
        fsGroupChangePolicy: {{ .Values.podSecurityContext.fsGroupChangePolicy }}
      {{- end }}
      {{- if .Values.dnsPolicy }}
      dnsPolicy: {{ .Values.dnsPolicy }}
      {{- end }}
      {{- if .Values.dnsConfig }}
      dnsConfig: {{- include "common.tplvalues.render" (dict "value" .Values.dnsConfig "context" .) | nindent 8 }}
      {{- end }}
      enableServiceLinks: {{ .Values.enableServiceLinks }}
      {{- if .Values.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- end }}
      {{- if or .Values.defaultInitContainers.prepareWriteDirs.enabled .Values.initContainers }}
      initContainers:
        {{- if .Values.defaultInitContainers.prepareWriteDirs.enabled }}
          {{- include "keycloak.defaultInitContainers.prepareWriteDirs" . | nindent 8 }}
        {{- end }}
        {{- if .Values.initContainers }}
          {{- include "common.tplvalues.render" (dict "value" .Values.initContainers "context" .) | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
        - name: keycloak
          image: {{ template "keycloak.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if and (eq (include "keycloak.replicaKind" .) "Deployment") .Values.cache.remote.host (not .Values.cache.configFile) }}
          command:
            - /bin/sh
            - -c
            - |
              echo "DEBUG: Listing /opt/keycloak/conf at container start:"
              ls -la /opt/keycloak/conf/
              echo "DEBUG: Checking for cache-ispn-full-remote.xml:"
              if [ -f /opt/keycloak/conf/cache-ispn-full-remote.xml ]; then
                echo "File EXISTS"
                ls -la /opt/keycloak/conf/cache-ispn-full-remote.xml
              else
                echo "File NOT FOUND"
              fi
              # Start Keycloak
              exec /opt/keycloak/bin/kc.sh start
          {{- end }}
          {{- if .Values.lifecycleHooks }}
          lifecycle: {{- include "common.tplvalues.render" (dict "value" .Values.lifecycleHooks "context" .) | nindent 12 }}
          {{- end }}
          {{- if .Values.containerSecurityContext.enabled }}
          securityContext:
            {{- if .Values.containerSecurityContext.runAsUser }}
            runAsUser: {{ .Values.containerSecurityContext.runAsUser }}
            {{- end }}
            {{- if .Values.containerSecurityContext.runAsNonRoot }}
            runAsNonRoot: {{ .Values.containerSecurityContext.runAsNonRoot }}
            {{- end }}
            {{- if .Values.containerSecurityContext.allowPrivilegeEscalation }}
            allowPrivilegeEscalation: {{ .Values.containerSecurityContext.allowPrivilegeEscalation }}
            {{- end }}
            {{- if .Values.containerSecurityContext.readOnlyRootFilesystem }}
            readOnlyRootFilesystem: {{ .Values.containerSecurityContext.readOnlyRootFilesystem }}
            {{- end }}
            {{- if .Values.containerSecurityContext.capabilities }}
            capabilities: {{- include "common.tplvalues.render" (dict "value" .Values.containerSecurityContext.capabilities "context" .) | nindent 14 }}
            {{- end }}
          {{- end }}
          {{- if .Values.diagnosticMode.enabled }}
          command: {{- include "common.tplvalues.render" (dict "value" .Values.diagnosticMode.command "context" .) | nindent 12 }}
          {{- else if .Values.command }}
          command: {{- include "common.tplvalues.render" (dict "value" .Values.command "context" .) | nindent 12 }}
          {{- else }}
          command:
            - /opt/keycloak/bin/kc.sh
            - start
          {{- end }}
          {{- if .Values.diagnosticMode.enabled }}
          args: {{- include "common.tplvalues.render" (dict "value" .Values.diagnosticMode.args "context" .) | nindent 12 }}
          {{- else if .Values.args }}
          args: {{- include "common.tplvalues.render" (dict "value" .Values.args "context" .) | nindent 12 }}
          {{- else if .Values.extraStartupArgs }}
          args: {{- include "common.tplvalues.render" (dict "value" .Values.extraStartupArgs "context" .) | nindent 12 }}
          {{- end }}
          env:
            - name: KUBERNETES_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            {{- if and .Values.auth .Values.auth.adminUser }}
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: {{ .Values.auth.adminUser | quote }}
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.secretName" . }}
                  key: {{ include "keycloak.secretKey" . }}
            {{- end }}
            {{- if .Values.dbExistingSecret }}
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.database.secretName" . }}
                  key: {{ include "keycloak.database.secretPasswordKey" . }}
            {{- if .Values.dbExistingSecretUserKey }}
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.database.secretName" . }}
                  key: {{ include "keycloak.database.secretUserKey" . }}
            {{- end }}
            {{- end }}
          {{- if not .Values.usePasswordFiles }}
            {{- if and .Values.tls.enabled (not .Values.tls.autoGenerated.enabled) (or .Values.tls.keystorePassword .Values.tls.passwordsSecret) }}
            - name: KC_HTTPS_KEY_STORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.tls.passwordsSecretName" . }}
                  key: "tls-keystore-password"
            {{- end }}
            {{- if and .Values.tls.enabled (not .Values.tls.autoGenerated.enabled) (or .Values.tls.truststorePassword .Values.tls.passwordsSecret) }}
            - name: KC_HTTPS_TRUST_STORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.tls.passwordsSecretName" . }}
                  key: "tls-truststore-password"
            {{- end }}
            {{- if .Values.cache.remote.host }}
            - name: KC_CACHE_REMOTE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.cache.remote.secretName" . }}
                  key: {{ include "keycloak.cache.remote.secretKey" . }}
            - name: KC_CACHE_REMOTE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.cache.remote.secretName" . }}
                  key: "username"
            {{- end }}
          {{- end }}
          {{- /* Password for full-remote-cache config (needed as env var for XML resolution) */}}
          {{- if and (eq (include "keycloak.replicaKind" .) "Deployment") .Values.cache.remote.host .Values.usePasswordFiles }}
            - name: KC_CACHE_REMOTE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.cache.remote.secretName" . }}
                  key: {{ include "keycloak.cache.remote.secretKey" . }}
            - name: KC_CACHE_REMOTE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.cache.remote.secretName" . }}
                  key: "username"
          {{- end }}
            {{- if .Values.extraEnvVars }}
            {{- include "common.tplvalues.render" (dict "value" .Values.extraEnvVars "context" .) | nindent 12 }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ printf "%s-env-vars" (include "common.names.fullname" .) }}
            {{- if .Values.extraEnvVarsCM }}
            - configMapRef:
                name: {{ tpl .Values.extraEnvVarsCM . }}
            {{- end }}
            {{- if .Values.extraEnvVarsSecret }}
            - secretRef:
                name: {{ tpl .Values.extraEnvVarsSecret . }}
            {{- end }}
          {{- if .Values.resources }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPorts.http }}
              protocol: TCP
            {{- if .Values.tls.enabled }}
            - name: https
              containerPort: {{ .Values.containerPorts.https }}
              protocol: TCP
            {{- end }}
            {{- if .Values.metrics.enabled }}
            - name: management
              containerPort: {{ .Values.containerPorts.management }}
              protocol: TCP
            {{- end}}
            {{- /* Constant in code: https://github.com/keycloak/keycloak/blob/ce8e925c1ad9bf7a3180d1496e181aeea0ab5f8a/operator/src/main/java/org/keycloak/operator/Constants.java#L60 */}}
            - name: discovery
              containerPort: 7800
            {{- if .Values.extraContainerPorts }}
            {{- include "common.tplvalues.render" (dict "value" .Values.extraContainerPorts "context" .) | nindent 12 }}
            {{- end }}
          {{- if not .Values.diagnosticMode.enabled }}
          {{- if .Values.customStartupProbe }}
          startupProbe: {{- include "common.tplvalues.render" (dict "value" .Values.customStartupProbe "context" .) | nindent 12 }}
          {{- else if .Values.startupProbe.enabled }}
          startupProbe: {{- omit .Values.startupProbe "enabled" | toYaml | nindent 12 }}
            httpGet:
              path: {{ trimSuffix "/" .Values.httpRelativePath }}/health/started
              port: {{ ternary .Values.containerPorts.management (ternary .Values.containerPorts.https .Values.containerPorts.http .Values.tls.enabled) .Values.metrics.enabled }}
              scheme: {{ ternary "HTTPS" "HTTP" .Values.tls.enabled }}
          {{- end }}
          {{- if .Values.customLivenessProbe }}
          livenessProbe: {{- include "common.tplvalues.render" (dict "value" .Values.customLivenessProbe "context" .) | nindent 12 }}
          {{- else if .Values.livenessProbe.enabled }}
          livenessProbe: {{- omit .Values.livenessProbe "enabled" | toYaml | nindent 12 }}
            httpGet:
              path: {{ trimSuffix "/" .Values.httpRelativePath }}/health/live
              port: {{ ternary .Values.containerPorts.management (ternary .Values.containerPorts.https .Values.containerPorts.http .Values.tls.enabled) .Values.metrics.enabled }}
              scheme: {{ ternary "HTTPS" "HTTP" .Values.tls.enabled }}
          {{- end }}
          {{- if .Values.customReadinessProbe }}
          readinessProbe: {{- include "common.tplvalues.render" (dict "value" .Values.customReadinessProbe "context" .) | nindent 12 }}
          {{- else if .Values.readinessProbe.enabled }}
          readinessProbe: {{- omit .Values.readinessProbe "enabled" | toYaml | nindent 12 }}
            httpGet:
              path: {{ trimSuffix "/" .Values.httpRelativePath }}/health/ready
              port: {{ ternary .Values.containerPorts.management (ternary .Values.containerPorts.https .Values.containerPorts.http .Values.tls.enabled) .Values.metrics.enabled }}
              scheme: {{ ternary "HTTPS" "HTTP" .Values.tls.enabled }}
          {{- end }}
          {{- end }}
          volumeMounts:
            - name: empty-dir
              mountPath: /tmp
              subPath: tmp-dir
            - name: empty-dir
              mountPath: /opt/keycloak/conf
              subPath: app-conf-dir
            - name: empty-dir
              mountPath: /opt/keycloak/lib/quarkus
              subPath: app-quarkus-dir
            - name: empty-dir
              mountPath: /opt/keycloak/data
              subPath: app-data-dir
            - name: empty-dir
              mountPath: /opt/keycloak/providers
              subPath: app-providers-dir
            - name: empty-dir
              mountPath: /opt/keycloak/themes
              subPath: app-themes-dir
            {{- if and (eq (include "keycloak.replicaKind" .) "Deployment") .Values.cache.remote.host (not .Values.cache.configFile) }}
            - name: full-remote-cache-config
              mountPath: /tmp/cache-config
            {{- end }}
            {{- if  .Values.usePasswordFiles }}
            - name: keycloak-secrets
              mountPath: /opt/keycloak/secrets
            {{- end }}
            {{- if or .Values.configuration .Values.existingConfigmap }}
            - name: keycloak-config
              mountPath: /opt/keycloak/conf/keycloak.conf
              subPath: keycloak.conf
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: certificates
              mountPath: /opt/keycloak/certs
              readOnly: true
            {{- end }}
            {{- if .Values.trustedCertsExistingSecret }}
            - name: truststore
              mountPath: /opt/keycloak/truststore
              readOnly: true
            {{- end }}
            {{- if or .Values.initdbScriptsConfigMap .Values.initdbScripts }}
            - name: custom-init-scripts
              mountPath: /docker-entrypoint-initdb.d
            {{- end }}
            {{- if .Values.extraVolumeMounts }}
            {{- include "common.tplvalues.render" (dict "value" .Values.extraVolumeMounts "context" .) | nindent 12 }}
            {{- end }}
        {{- if .Values.sidecars }}
        {{- include "common.tplvalues.render" ( dict "value" .Values.sidecars "context" .) | nindent 8 }}
        {{- end }}
      volumes:
        - name: empty-dir
          emptyDir: {}
        {{- if .Values.usePasswordFiles }}
        - name: keycloak-secrets
          projected:
            sources:
              - secret:
                  name: {{ include "keycloak.secretName" . }}
              - secret:
                  name: {{ include "keycloak.database.secretName" . }}
                  items:
                    - key: {{ include "keycloak.database.secretPasswordKey" . }}
                      path: {{ printf "db-%s" (include "keycloak.database.secretPasswordKey" .) }}
                    {{- if .Values.dbExistingSecretUserKey }}
                    - key: {{ include "keycloak.database.secretUserKey" . }}
                      path: {{ printf "db-%s" (include "keycloak.database.secretUserKey" .) }}
                    {{- end }}
              {{- if and .Values.tls.enabled (not .Values.tls.autoGenerated.enabled) (or .Values.tls.keystorePassword .Values.tls.truststorePassword .Values.tls.passwordsSecret) }}
              - secret:
                  name: {{ include "keycloak.tls.passwordsSecretName" . }}
              {{- end }}
              {{- if and .Values.cache.remote.host (or .Values.cache.remote.password .Values.cache.remote.existingSecret) }}
              - secret:
                  name: {{ include "keycloak.cache.remote.secretName" . }}
                  items:
                    - key: {{ include "keycloak.cache.remote.secretKey" . }}
                      path: {{ printf "remote-cache-%s" (include "keycloak.cache.remote.secretKey" .) }}
              {{- end }}
        {{- end }}
        {{- if or .Values.configuration .Values.existingConfigmap }}
        - name: keycloak-config
          configMap:
            name: {{ include "keycloak.configmapName" . }}
        {{- end }}
        {{- if .Values.tls.enabled }}
        - name: certificates
          secret:
            secretName: {{ include "keycloak.tls.secretName" . }}
            defaultMode: 420
        {{- end }}
        {{- if .Values.trustedCertsExistingSecret }}
        - name: truststore
          secret:
            secretName: {{ tpl .Values.trustedCertsExistingSecret . }}
            defaultMode: 420
        {{- end }}
        {{- if or .Values.initdbScriptsConfigMap .Values.initdbScripts }}
        - name: custom-init-scripts
          configMap:
            name: {{ include "keycloak.initdbScripts.configmapName" . }}
        {{- end }}
        {{- if and (eq (include "keycloak.replicaKind" .) "Deployment") .Values.cache.remote.host (not .Values.cache.configFile) }}
        - name: full-remote-cache-config
          configMap:
            name: {{ printf "%s-full-remote-cache" (include "common.names.fullname" .) }}
        {{- end }}
        {{- if .Values.extraVolumes }}
        {{- include "common.tplvalues.render" (dict "value" .Values.extraVolumes "context" .) | nindent 8 }}
        {{- end }}
