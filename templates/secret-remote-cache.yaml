{{- if and .Values.cache.remote.host (not .Values.cache.remote.existingSecret) .Values.cache.remote.password }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-remote-cache" (include "common.names.fullname" .) }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" (dict "customLabels" .Values.commonLabels "context" .) | nindent 4 }}
    app.kubernetes.io/component: keycloak
    app.kubernetes.io/part-of: keycloak
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" (dict "value" .Values.commonAnnotations "context" .) | nindent 4 }}
  {{- end }}
type: Opaque
data:
  password: {{ .Values.cache.remote.password | b64enc | quote }}
{{- end }}
